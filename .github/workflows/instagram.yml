name: Publication Instagram

on:
  schedule:
    # Lundi 16h00 UTC et jeudi 16h30 UTC (~09h00 / 18h30 Europe/Paris)
    - cron: "0 16 * * 1"
    - cron: "30 16 * * 4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Paris
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
      IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Publier le post du jour
        run: python pipeline.py --publish

      - name: Sauvegarder l'état des posts
        run: |
          if ! git diff --quiet -- captions.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add captions.json
            git commit -m "Mise à jour automatique des posts publiés"
            git push
          fi
